---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: banking-api-sa
  namespace: banking
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: banking-dashboard-sa
  namespace: banking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: banking
rules:
- resources:
  - pods
  - services
  - configmaps
  verbs:
  - get
  - list
  - watch
  apiGroups: [""]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-binding
  namespace: banking
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: developer
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: developer
