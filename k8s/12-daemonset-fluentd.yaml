apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: banking
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/banking-api*banking*.log,/var/log/containers/banking-dashboard*banking*.log,/var/log/containers/postgres*banking*.log
      pos_file /var/log/fluentd-banking.log.pos
      tag banking.*
      read_from_head false
      <parse>
        @type json
      </parse>
    </source>

    <filter banking.**>
      @type record_transformer
      enable_ruby true
      <record>
        message ${File.basename(tag.gsub("banking.var.log.containers.", "").split("_banking_").first) + " | " + record["log"].to_s.strip}
      </record>
      remove_keys log,stream,time
    </filter>

    <match banking.**>
      @type stdout
      <format>
        @type single_value
        message_key message
        add_newline true
      </format>
    </match>
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: banking
  labels:
    app: fluentd
spec:
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      labels:
        app: fluentd
    spec:
      serviceAccountName: fluentd-sa
      nodeSelector:
        type: high-memory
      tolerations:
        - operator: Exists
#---------------------------------------------------------  
## Container
      containers:
        - name: fluentd
          image: fluent/fluentd-kubernetes-daemonset:v1-debian-elasticsearch
#---------------------------------------------------------
## resources
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
#---------------------------------------------------------
## volume mount && volumes
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: containerlogdir
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluentd-config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: containerlogdir
          hostPath:
            path: /var/lib/docker/containers
        - name: fluentd-config
          configMap:
            name: fluentd-config
#---------------------------------------------------------