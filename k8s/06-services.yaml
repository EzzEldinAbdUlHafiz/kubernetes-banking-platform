# ── Headless Service for PostgreSQL StatefulSet ───────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: banking
spec:
  clusterIP: None          # makes it headless
  selector:
    app: postgres-db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres

