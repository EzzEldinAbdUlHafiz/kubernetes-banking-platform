# ── 1. Default deny all ingress and egress — baseline; blocks everything unless explicitly allowed by a subsequent policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: banking
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ── 2. Allow DNS egress for all pods  — all pods need DNS (port 53) to resolve service names like
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: banking
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# ── 3. Allow ingress controller → dashboard — lets the nginx ingress controller reach the dashboard pod on port 80
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-dashboard
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: banking-dashboard
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 80

---
# ── 4. Allow ingress controller → API — lets the nginx ingress controller reach the API pods on port 3000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: banking-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000

---
# ── 5. Allow API egress → postgres — lets API pods initiate connections to postgres on port 5432
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress-to-postgres
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: banking-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-db
      ports:
        - port: 5432

---
# ── 6. Allow API ingress ← postgres (response on ephemeral port) — allows postgres response traffic back into the API pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress-from-postgres
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: banking-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: postgres-db

---
# ── 7. Allow postgres ingress ← API — allows postgres pods to receive connections from the API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-postgres
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: postgres-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: banking-api
      ports:
        - port: 5432

---
# ── 8. Allow postgres egress → API (response on ephemeral port) — allows postgres to egress back to the API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress-to-api
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: postgres-db
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: banking-api

---
# ── 9. Allow postgres replication — allows postgres-db-0 and postgres-db-1 to talk to each other on port 5432 for WAL streaming
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-replication
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: postgres-db
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: postgres-db
      ports:
        - port: 5432
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-db
      ports:
        - port: 5432

---
# ── 10. Allow fluentd egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fluentd-egress
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: fluentd
  policyTypes:
    - Egress
  egress:
    - {}