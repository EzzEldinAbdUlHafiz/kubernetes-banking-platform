# ── App Configuration ──────────────────────────────────────
# This file contains non-sensitive application config.
#
# NOTE: The postgres init script ConfigMap is NOT here.
# It is generated from k8s/scripts/postgres-init.sh by setup.sh
# or manually with:
#
  # kubectl create configmap postgres-setup-script \
  #   --from-file=init.sh=k8s/scripts/postgres-init.sh \
  #   --namespace=banking \
  #   --dry-run=client -o yaml | kubectl apply -f -
  
  # kubectl create configmap fluentd-config \
  #   --from-file=fluent.conf=k8s/scripts/fluent.conf \
  #   --namespace=banking \
  #   --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: banking-config
  namespace: banking
data:
  DB_HOST_PRIMARY: postgres-db-0.postgres-db.banking.svc.cluster.local
  DB_HOST_REPLICA: postgres-db-1.postgres-db.banking.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: bankingdb
  DB_USER: bankuser
  API_LOG_LEVEL: info
  MAX_TRANSACTION_LIMIT: "50000"
  PORT: "3000"