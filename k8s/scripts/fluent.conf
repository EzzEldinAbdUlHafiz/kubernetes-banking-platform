<source>
  @type tail
  path /var/log/containers/*banking*.log
  exclude_path /var/log/containers/fluentd*
  pos_file /var/log/fluentd-banking.log.pos
  tag banking.*
  read_from_head false
  <parse>
    @type json
    time_key time
    keep_time_key true
  </parse>
</source>

<filter banking.**>
  @type record_transformer
  enable_ruby true
  <record>
    pod_name ${tag_parts[3]}
    message ${(record["log"] || record["message"]).to_s.strip}
  </record>
</filter>

<match banking.**>
  @type stdout
  <format>
    @type single_value
    message_key message
    add_newline true
  </format>
</match>