<source>
      @type tail
      path /var/log/containers/banking-api*banking*.log,/var/log/containers/banking-dashboard*banking*.log,/var/log/containers/postgres*banking*.log
      pos_file /var/log/fluentd-banking.log.pos
      tag banking.*
      read_from_head false
      <parse>
        @type json
      </parse>
    </source>

    <filter banking.**>
      @type record_transformer
      enable_ruby true
      <record>
        message ${File.basename(tag.gsub("banking.var.log.containers.", "").split("_banking_").first) + " | " + record["log"].to_s.strip}
      </record>
      remove_keys log,stream,time
    </filter>

    <match banking.**>
      @type stdout
      <format>
        @type single_value
        message_key message
        add_newline true
      </format>
    </match>